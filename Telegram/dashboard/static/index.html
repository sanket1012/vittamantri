<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3248;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --green: #22c55e;
      --red: #ef4444;
      --blue: #3b82f6;
      --accent: #6366f1;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 24px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
    }

    header h1 span { color: var(--accent); }

    select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      outline: none;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
    }

    .card-label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .card-value {
      font-size: 1.75rem;
      font-weight: 700;
    }

    .card-value.income  { color: var(--green); }
    .card-value.expense { color: var(--red); }
    .card-value.net.pos { color: var(--green); }
    .card-value.net.neg { color: var(--red); }

    .charts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }

    @media (max-width: 768px) {
      .charts { grid-template-columns: 1fr; }
    }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .chart-card h2 {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .chart-wrap {
      position: relative;
      height: 260px;
    }

    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .tab-btn {
      background: none;
      border: none;
      color: var(--muted);
      padding: 10px 18px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-btn:hover:not(.active) { color: var(--text); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .table-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      overflow-x: auto;
    }

    .table-card h2 {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .goal-card, .plan-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 12px;
    }

    .goal-name, .plan-name {
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 6px;
    }

    .goal-meta, .plan-meta {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .progress-bar-wrap {
      background: var(--border);
      border-radius: 99px;
      height: 6px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: var(--accent);
      transition: width 0.5s ease;
    }

    .progress-label {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 5px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 640px) { .grid-2 { grid-template-columns: 1fr; } }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    thead th {
      text-align: left;
      padding: 10px 12px;
      color: var(--muted);
      font-weight: 500;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    thead th:hover { color: var(--text); }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }

    tbody td {
      padding: 10px 12px;
      vertical-align: middle;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge.income  { background: rgba(34,197,94,0.15);  color: var(--green); }
    .badge.expense { background: rgba(239,68,68,0.15);  color: var(--red); }

    .amount.income  { color: var(--green); font-weight: 600; }
    .amount.expense { color: var(--red);   font-weight: 600; }

    .source-icon { font-size: 0.8rem; color: var(--muted); }

    .btn-delete {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 3px 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.75rem;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-delete:hover { border-color: var(--red); color: var(--red); }

    .filter-row {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-row select, .filter-row input {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 0.85rem;
      outline: none;
    }

    .empty {
      text-align: center;
      padding: 48px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>Finance <span>Dashboard</span></h1>
  <select id="monthSelect"><option value="">Loading...</option></select>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('overview')">Overview</button>
  <button class="tab-btn" onclick="switchTab('transactions')">Transactions</button>
  <button class="tab-btn" onclick="switchTab('goals')">Goals</button>
  <button class="tab-btn" onclick="switchTab('plans')">Plans</button>
</div>

<!-- Overview tab -->
<div id="tab-overview" class="tab-panel active">
  <div class="cards">
    <div class="card">
      <div class="card-label">Income</div>
      <div class="card-value income" id="cardIncome">—</div>
    </div>
    <div class="card">
      <div class="card-label">Expenses</div>
      <div class="card-value expense" id="cardExpenses">—</div>
    </div>
    <div class="card">
      <div class="card-label">Net Balance</div>
      <div class="card-value net" id="cardNet">—</div>
    </div>
    <div class="card">
      <div class="card-label">Transactions</div>
      <div class="card-value" id="cardCount" style="color:var(--blue)">—</div>
    </div>
  </div>

  <div class="charts">
    <div class="chart-card">
      <h2>Monthly Overview</h2>
      <div class="chart-wrap"><canvas id="barChart"></canvas></div>
    </div>
    <div class="chart-card">
      <h2>Expenses by Category</h2>
      <div class="chart-wrap"><canvas id="doughnutChart"></canvas></div>
    </div>
  </div>

</div>

<!-- Transactions tab -->
<div id="tab-transactions" class="tab-panel">
  <div class="table-card">
    <div class="filter-row">
      <select id="txMonthFilter"></select>
      <select id="txTypeFilter">
        <option value="">All types</option>
        <option value="expense">Expense</option>
        <option value="income">Income</option>
      </select>
      <input id="txSearch" type="text" placeholder="Search description or category…" style="flex:1;min-width:160px">
    </div>
    <div id="txTableWrap"><div class="empty"><span class="spinner"></span></div></div>
  </div>
</div>

<!-- Goals tab -->
<div id="tab-goals" class="tab-panel">
  <div id="goalsWrap"><div class="empty"><span class="spinner"></span></div></div>
</div>

<!-- Plans tab -->
<div id="tab-plans" class="tab-panel">
  <div id="plansWrap"><div class="empty"><span class="spinner"></span></div></div>
</div>

<script>
  const fmt = (n) => '₹' + Number(n).toLocaleString('en-IN', { maximumFractionDigits: 0 });
  const MONTH_COLORS = ['#6366f1','#8b5cf6','#a78bfa','#c4b5fd','#ddd6fe','#ede9fe'];
  const CAT_COLORS   = ['#ef4444','#f97316','#eab308','#22c55e','#3b82f6','#a855f7','#ec4899','#14b8a6'];

  let barChartInst = null;
  let doughnutInst = null;
  let currentMonth = '';

  // ── Load available months ──────────────────────────────────────────
  async function loadMonths() {
    const res = await fetch('/api/months');
    const { months } = await res.json();
    const sel = document.getElementById('monthSelect');
    sel.innerHTML = '';

    // Always include current month so the UI is never stuck on a spinner
    const now = new Date();
    const thisMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    const allMonths = months.includes(thisMonth) ? months : [thisMonth, ...months];

    allMonths.forEach((m, i) => {
      const label = new Date(m + '-01').toLocaleDateString('en-IN', { month: 'long', year: 'numeric' });
      const opt = document.createElement('option');
      opt.value = m;
      opt.textContent = label;
      if (i === 0) opt.selected = true;
      sel.appendChild(opt);
    });
    currentMonth = allMonths[0];
    await loadAll(currentMonth);
  }

  document.getElementById('monthSelect').addEventListener('change', async (e) => {
    currentMonth = e.target.value;
    await loadAll(currentMonth);
  });

  // ── Load everything for a month ────────────────────────────────────
  async function loadAll(month) {
    await Promise.all([
      loadSummary(month),
      loadBarChart(),
      loadTransactions(month),
    ]);
  }

  // ── Summary cards + doughnut ───────────────────────────────────────
  async function loadSummary(month) {
    const res = await fetch(`/api/summary?month=${month}`);
    const d = await res.json();

    document.getElementById('cardIncome').textContent   = fmt(d.total_income);
    document.getElementById('cardExpenses').textContent = fmt(d.total_expenses);

    const netEl = document.getElementById('cardNet');
    const net = d.net_balance;
    netEl.textContent = (net >= 0 ? '+' : '') + fmt(Math.abs(net));
    netEl.className = 'card-value net ' + (net >= 0 ? 'pos' : 'neg');

    // Doughnut — expense categories
    const cats = d.by_category.filter(c => c.type === 'expense');
    const labels = cats.map(c => c.category);
    const vals   = cats.map(c => c.total);
    renderDoughnut(labels, vals);
  }

  // ── Monthly bar chart ──────────────────────────────────────────────
  async function loadBarChart() {
    const res = await fetch('/api/monthly_totals');
    const { monthly_totals } = await res.json();
    const labels   = monthly_totals.map(m => {
      const d = new Date(m.month + '-01');
      return d.toLocaleDateString('en-IN', { month: 'short', year: '2-digit' });
    });
    const incomes  = monthly_totals.map(m => m.income   || 0);
    const expenses = monthly_totals.map(m => m.expenses || 0);
    renderBar(labels, incomes, expenses);
  }

  // ── Transactions table ─────────────────────────────────────────────
  async function loadTransactions(month) {
    const res = await fetch(`/api/transactions?month=${month}&limit=100`);
    const { transactions } = await res.json();

    document.getElementById('cardCount').textContent = transactions.length;

    const wrap = document.getElementById('tableWrap');
    if (!transactions.length) {
      wrap.innerHTML = '<div class="empty">No transactions for this month.</div>';
      return;
    }

    const sourceLabel = { text: '💬', image: '📷', pdf: '📄' };
    const rows = transactions.map(t => `
      <tr>
        <td>${t.date}</td>
        <td><span class="badge ${t.type}">${t.type}</span></td>
        <td>${t.category}</td>
        <td class="amount ${t.type}">${t.type === 'expense' ? '-' : '+'}${fmt(t.amount)}</td>
        <td style="color:var(--muted)">${t.description || ''}</td>
        <td class="source-icon" title="${t.source}">${sourceLabel[t.source] || '?'}</td>
      </tr>
    `).join('');

    wrap.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Date</th><th>Type</th><th>Category</th>
            <th>Amount</th><th>Description</th><th>Via</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }

  // ── Chart renderers ────────────────────────────────────────────────
  function renderBar(labels, incomes, expenses) {
    const ctx = document.getElementById('barChart').getContext('2d');
    if (barChartInst) barChartInst.destroy();
    barChartInst = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: 'Income',   data: incomes,  backgroundColor: 'rgba(34,197,94,0.7)',  borderRadius: 4 },
          { label: 'Expenses', data: expenses, backgroundColor: 'rgba(239,68,68,0.7)', borderRadius: 4 },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#94a3b8', boxWidth: 12 } } },
        scales: {
          x: { ticks: { color: '#94a3b8' }, grid: { color: '#2e3248' } },
          y: { ticks: { color: '#94a3b8', callback: v => '₹' + v.toLocaleString('en-IN') }, grid: { color: '#2e3248' } },
        }
      }
    });
  }

  function renderDoughnut(labels, vals) {
    const ctx = document.getElementById('doughnutChart').getContext('2d');
    if (doughnutInst) doughnutInst.destroy();
    if (!vals.length) { ctx.clearRect(0,0,999,999); return; }
    doughnutInst = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels,
        datasets: [{ data: vals, backgroundColor: CAT_COLORS, borderWidth: 2, borderColor: '#1a1d27' }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        cutout: '65%',
        plugins: {
          legend: { position: 'right', labels: { color: '#94a3b8', boxWidth: 12, padding: 10, font: { size: 12 } } },
          tooltip: { callbacks: { label: ctx => ` ${fmt(ctx.parsed)}` } }
        }
      }
    });
  }

  // ── Tabs ───────────────────────────────────────────────────────────
  const TAB_NAMES = ['overview', 'transactions', 'goals', 'plans'];
  function switchTab(name) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', TAB_NAMES[i] === name);
    });
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    if (name === 'transactions') initTxTab();
    if (name === 'goals')        loadGoals();
    if (name === 'plans')        loadPlans();
  }

  // ── Transactions Tab ────────────────────────────────────────────────
  let allTxRows = [];
  let txTabReady = false;

  async function initTxTab() {
    // Populate month filter from available months
    const res = await fetch('/api/months');
    const { months } = await res.json();
    const sel = document.getElementById('txMonthFilter');
    sel.innerHTML = '<option value="">All months</option>';
    const now = new Date();
    const thisMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    const allMonths = months.includes(thisMonth) ? months : [thisMonth, ...months];
    allMonths.forEach(m => {
      const label = new Date(m + '-01').toLocaleDateString('en-IN', { month: 'long', year: 'numeric' });
      const opt = document.createElement('option');
      opt.value = m; opt.textContent = label;
      if (m === (currentMonth || thisMonth)) opt.selected = true;
      sel.appendChild(opt);
    });

    sel.addEventListener('change', () => fetchTxRows());
    document.getElementById('txTypeFilter').addEventListener('change', () => renderTxTable());
    document.getElementById('txSearch').addEventListener('input', () => renderTxTable());

    await fetchTxRows();
    txTabReady = true;
  }

  async function fetchTxRows() {
    const month = document.getElementById('txMonthFilter').value;
    const url = month ? `/api/transactions?month=${month}&limit=500` : `/api/transactions?limit=500`;
    const res = await fetch(url);
    const { transactions } = await res.json();
    allTxRows = transactions;
    renderTxTable();
  }

  function renderTxTable() {
    const typeF = document.getElementById('txTypeFilter').value;
    const searchF = document.getElementById('txSearch').value.toLowerCase();
    const wrap = document.getElementById('txTableWrap');

    let rows = allTxRows;
    if (typeF) rows = rows.filter(t => t.type === typeF);
    if (searchF) rows = rows.filter(t =>
      (t.category || '').toLowerCase().includes(searchF) ||
      (t.description || '').toLowerCase().includes(searchF)
    );

    if (!rows.length) {
      wrap.innerHTML = '<div class="empty">No transactions match your filters.</div>';
      return;
    }

    const sourceLabel = { text: '&#128172;', image: '&#128247;', pdf: '&#128196;', recurring: '&#128257;' };
    wrap.innerHTML = `
      <div style="font-size:0.82rem;color:var(--muted);margin-bottom:12px">${rows.length} transaction${rows.length !== 1 ? 's' : ''}</div>
      <table>
        <thead><tr>
          <th>Date</th><th>Type</th><th>Category</th>
          <th>Amount</th><th>Description</th><th>Via</th><th></th>
        </tr></thead>
        <tbody>
          ${rows.map(t => `
            <tr id="tx-row-${t.id}">
              <td>${t.date}</td>
              <td><span class="badge ${t.type}">${t.type}</span></td>
              <td>${t.category}</td>
              <td class="amount ${t.type}">${t.type === 'expense' ? '-' : '+'}${fmt(t.amount)}</td>
              <td style="color:var(--muted)">${t.description || ''}</td>
              <td class="source-icon">${sourceLabel[t.source] || '?'}</td>
              <td><button class="btn-delete" onclick="deleteTx(${t.id})">Delete</button></td>
            </tr>`).join('')}
        </tbody>
      </table>`;
  }

  async function deleteTx(id) {
    const row = document.getElementById('tx-row-' + id);
    if (row) row.style.opacity = '0.4';
    try {
      const res = await fetch(`/api/transactions/${id}`, { method: 'DELETE' });
      if (!res.ok) throw new Error('Failed');
      // Remove from local cache and re-render
      allTxRows = allTxRows.filter(t => t.id !== id);
      renderTxTable();
      // Refresh overview stats silently
      if (currentMonth) loadSummary(currentMonth);
    } catch {
      if (row) row.style.opacity = '1';
      alert('Could not delete transaction. Try again.');
    }
  }

  // ── Goals ───────────────────────────────────────────────────────────
  async function loadGoals() {
    const res = await fetch('/api/goals');
    const { goals } = await res.json();
    const wrap = document.getElementById('goalsWrap');
    if (!goals.length) {
      wrap.innerHTML = '<div class="empty">No active goals yet.<br><br>Set one in Telegram:<br><em>"Save 200000 for vacation by December"</em></div>';
      return;
    }
    wrap.innerHTML = '<div class="grid-2">' + goals.map(g => {
      const dateStr = g.target_date ? ` · by ${g.target_date}` : '';
      return `<div class="goal-card">
        <div class="goal-name">&#127919; ${g.name}</div>
        <div class="goal-meta">&#8377;${Number(g.target_amount).toLocaleString('en-IN')}${dateStr} · ${g.category}</div>
        ${g.notes ? `<div class="goal-meta">${g.notes}</div>` : ''}
        <div style="font-size:0.8rem;color:var(--muted)">Use /cancelgoal ${g.id} to remove</div>
      </div>`;
    }).join('') + '</div>';
  }

  // ── Plans ───────────────────────────────────────────────────────────
  async function loadPlans() {
    const res = await fetch('/api/plans');
    const { plans } = await res.json();
    const wrap = document.getElementById('plansWrap');
    if (!plans.length) {
      wrap.innerHTML = '<div class="empty">No planned expenses yet.<br><br>Add one in Telegram:<br><em>"Planning to buy a laptop for 80000 in June"</em></div>';
      return;
    }
    const total = plans.reduce((s, p) => s + p.amount, 0);
    wrap.innerHTML =
      `<div class="card" style="margin-bottom:20px;max-width:220px">
        <div class="card-label">Total Planned</div>
        <div class="card-value expense">&#8377;${total.toLocaleString('en-IN',{maximumFractionDigits:0})}</div>
      </div>
      <div class="grid-2">` +
      plans.map(p => `<div class="plan-card">
        <div class="plan-name">&#128197; ${p.name}</div>
        <div class="plan-meta">&#8377;${Number(p.amount).toLocaleString('en-IN')} · ${p.planned_date} · ${p.category}</div>
        ${p.notes ? `<div class="plan-meta">${p.notes}</div>` : ''}
        <div style="font-size:0.8rem;color:var(--muted)">Use /cancelplan ${p.id} to remove</div>
      </div>`).join('') + '</div>';
  }

  // ── Boot ───────────────────────────────────────────────────────────
  loadMonths();
</script>
</body>
</html>
